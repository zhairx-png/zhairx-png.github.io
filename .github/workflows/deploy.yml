name: Deploy to GitHub Pages

on:
  # 监听 main 分支的 push 事件
  push:
    branches: ["main"]
  # 允许在 GitHub 网页上通过按钮手动触发部署
  workflow_dispatch:

# 设置权限，允许 GitHub Actions 临时配置和部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许排队或取消进行中的并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 我们 Vite 默认打包出的产物文件夹是 dist
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
